<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@700&family=Oswald:wght@600&family=Poppins:wght@600&family=Roboto:wght@700&display=swap" rel="stylesheet">

<style>
:root{
--overlay-font: Arial;
--color-all:#ffffff;
--color-num:#ffffff;
--color-max:#ffffff;
--color-label:#ffffff;
--color-icon:#ffffff;
--color-negative:#ff4d4f;
--bg-color:#000000;
--bg-alpha:0;
}

body{margin:0;font-family:Arial}
body.live{background:transparent}
body.control{background:#0b0f14;color:#fff}

.overlay{
display:inline-flex;
gap:4px;
font-weight:800;
font-size:34px;
font-family:var(--overlay-font);
padding:6px 12px;
border-radius:12px;
}

body.live .overlay{
background:rgba(0,0,0,var(--bg-alpha));
}

#icon{color:var(--color-icon)}
#num{color:var(--color-num)}
#maxnum{color:var(--color-max)}
#label{color:var(--color-label)}

.negativo{
color:var(--color-negative)!important;
}

.panel{display:none}
body.control .panel{display:block;padding:20px}

.card{
background:#111;
padding:15px;
border-radius:12px;
width:220px;
margin:10px;
display:inline-block;
vertical-align:top;
}

input,select{
width:100%;
margin:5px 0;
padding:6px;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:6px;
margin-top:5px;
cursor:pointer;
border:none;
border-radius:6px;
font-weight:700;
}

</style>
</head>

<body class="live">

<div class="overlay">
<span id="icon">🏆</span>
<span id="num">0</span>
<span>/</span>
<span id="maxnum">10</span>
<span id="label">wins</span>
</div>

<div class="panel">

<div class="card">
<h3>Cores</h3>

<label>Aplicar para todos</label>
<input type="checkbox" id="allToggle">

<input type="color" id="allColor">

<label>Número</label>
<input type="color" id="numColor">

<label>Meta</label>
<input type="color" id="maxColor">

<label>Texto</label>
<input type="color" id="labelColor">

<label>Ícone</label>
<input type="color" id="iconColor">

<label>Negativo</label>
<input type="color" id="negColor">

</div>

<div class="card">
<h3>Fundo</h3>

<input type="color" id="bgColor">
<input type="range" id="bgAlpha" min="0" max="1" step="0.01">

</div>

<div class="card">
<h3>Fonte</h3>

<select id="font">
<option>Arial</option>
<option>Inter</option>
<option>Montserrat</option>
<option>Oswald</option>
<option>Poppins</option>
<option>Roboto</option>
</select>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

const app=initializeApp({
databaseURL:"https://wins-mine-default-rtdb.firebaseio.com/"
});

const db=getDatabase(app);

const refs={
wins:ref(db,"wins"),
colors:ref(db,"colors")
};

let wins=0;

const params=new URLSearchParams(location.search);
const control=params.get("view")==="control";
document.body.className=control?"control":"live";

const el={
num:document.getElementById("num"),
max:document.getElementById("maxnum"),
label:document.getElementById("label"),
icon:document.getElementById("icon"),

allToggle:document.getElementById("allToggle"),
allColor:document.getElementById("allColor"),

numColor:document.getElementById("numColor"),
maxColor:document.getElementById("maxColor"),
labelColor:document.getElementById("labelColor"),
iconColor:document.getElementById("iconColor"),
negColor:document.getElementById("negColor"),

bgColor:document.getElementById("bgColor"),
bgAlpha:document.getElementById("bgAlpha"),

font:document.getElementById("font")
};

function apply(c){

if(c.all){
document.documentElement.style.setProperty("--color-num",c.allColor);
document.documentElement.style.setProperty("--color-max",c.allColor);
document.documentElement.style.setProperty("--color-label",c.allColor);
document.documentElement.style.setProperty("--color-icon",c.allColor);
}else{
document.documentElement.style.setProperty("--color-num",c.num);
document.documentElement.style.setProperty("--color-max",c.max);
document.documentElement.style.setProperty("--color-label",c.label);
document.documentElement.style.setProperty("--color-icon",c.icon);
}

document.documentElement.style.setProperty("--color-negative",c.neg);
document.documentElement.style.setProperty("--bg-color",c.bg);
document.documentElement.style.setProperty("--bg-alpha",c.alpha);
document.documentElement.style.setProperty("--overlay-font",c.font);
}

onValue(refs.wins,s=>{
wins=s.val()||0;
el.num.textContent=wins;
el.num.classList.toggle("negativo",wins<0);
});

onValue(refs.colors,s=>{
const c=s.val()||{};
apply(c);
});

if(control){

function save(){
const data={
all:el.allToggle.checked,
allColor:el.allColor.value,
num:el.numColor.value,
max:el.maxColor.value,
label:el.labelColor.value,
icon:el.iconColor.value,
neg:el.negColor.value,
bg:el.bgColor.value,
alpha:el.bgAlpha.value,
font:el.font.value
};
set(refs.colors,data);
}

document.querySelectorAll("input,select").forEach(e=>{
e.oninput=save;
});

document.addEventListener("keydown",e=>{
if(e.key==="ArrowUp"||e.key==="+"||e.key==="=")set(refs.wins,wins+1);
if(e.key==="ArrowDown"||e.key==="-")set(refs.wins,wins-1);
if(e.key==="0")set(refs.wins,0);
});

}

</script>

</body>
</html>
