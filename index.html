<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wins Overlay</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
}

/* overlay */
.box {
  position: fixed;
  top: 60px;
  left: 60px;
  font-size: 48px;
  font-weight: 700;
  color: white;
  text-shadow:
    0 0 10px rgba(0,0,0,0.8),
    0 0 20px rgba(0,0,0,0.6);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

/* número */
#num {
  min-width: 50px;
  text-align: center;
}

.negativo {
  color: #ff3b3b;
}

/* painel */
#controls {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: rgba(0,0,0,0.85);
  padding: 15px;
  border-radius: 12px;
  color: white;
  font-size: 14px;
  display: none;
  width: 200px;
}

#controls input {
  width: 100%;
  margin: 5px 0;
}

button {
  margin: 5px 0;
  padding: 6px;
  width: 100%;
}
</style>
</head>

<body>

<div class="box">
  <span>🏆</span>
  <span id="num">0</span>
  <span id="max">/10</span>
  <span id="label">wins</span>
</div>

<div id="controls">
  <b>CONTROLE</b><br><br>

  ↑ ↓ = + - → alterar<br>
  0 → reset<br>
  Home → travar<br><br>

  <button onclick="add()">+1</button>
  <button onclick="sub()">-1</button>
  <button onclick="reset()">Reset</button>

  <hr>

  🎯 Meta:
  <input id="maxInput" type="number" placeholder="Ex: 10">

  📝 Texto:
  <input id="labelInput" type="text" placeholder="Ex: wins">

  ✏️ Valor manual:
  <input id="manualInput" type="number" placeholder="Ex: 5">

  <button onclick="applySettings()">Aplicar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAcg0UGMQ-iJbk_E8FSNLRipx2MvcJj4",
  authDomain: "wins-mine.firebaseapp.com",
  databaseURL: "https://wins-mine-default-rtdb.firebaseio.com/",
  projectId: "wins-mine",
  storageBucket: "wins-mine.firebasestorage.app",
  messagingSenderId: "328422738631",
  appId: "1:328422738631:web:dd115c799f82f5cb7e0ce2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔥 agora salva TUDO no Firebase
const winsRef = ref(db, "overlay/wins");
const maxRef = ref(db, "overlay/max");
const labelRef = ref(db, "overlay/label");

let wins = 0;
let locked = false;

const num = document.getElementById("num");
const maxEl = document.getElementById("max");
const labelEl = document.getElementById("label");

// mostrar painel só no control
const params = new URLSearchParams(window.location.search);
if (params.get("view") === "control") {
  document.getElementById("controls").style.display = "block";
}

// render
function render() {
  num.textContent = wins;
  num.classList.toggle("negativo", wins < 0);
}

// 🔥 sync wins
onValue(winsRef, (snap) => {
  wins = snap.val() ?? 0;
  render();
});

// 🔥 sync meta
onValue(maxRef, (snap) => {
  const v = snap.val() ?? 10;
  maxEl.textContent = "/" + v;
});

// 🔥 sync texto
onValue(labelRef, (snap) => {
  const v = snap.val() ?? "wins";
  labelEl.textContent = v;
});

// teclado
document.addEventListener("keydown", async (e) => {
  if (e.key === "Home") {
    locked = !locked;
    return;
  }

  if (locked) return;

  if (e.key === "ArrowUp" || e.key === "=" || e.key === "+") {
    await set(winsRef, wins + 1);
  }

  if (e.key === "ArrowDown" || e.key === "-") {
    await set(winsRef, wins - 1);
  }

  if (e.key === "0") {
    await set(winsRef, 0);
  }
});

// botões
window.add = async () => await set(winsRef, wins + 1);
window.sub = async () => await set(winsRef, wins - 1);
window.reset = async () => await set(winsRef, 0);

// 🔥 aplicar mudanças (agora salva no Firebase)
window.applySettings = async () => {
  const maxVal = document.getElementById("maxInput").value;
  const labelVal = document.getElementById("labelInput").value;
  const manualVal = document.getElementById("manualInput").value;

  if (maxVal) await set(maxRef, Number(maxVal));
  if (labelVal) await set(labelRef, labelVal);
  if (manualVal !== "") await set(winsRef, Number(manualVal));
};
</script>

</body>
</html>
