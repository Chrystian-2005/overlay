<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  overflow: hidden;
}

/* 🔥 overlay */
.overlay {
  position: absolute;
  top: 40px;
  left: 40px;

  display: flex;
  align-items: center;
  gap: 4px;

  font-size: 40px;
  font-weight: 700;
  color: white;

  text-shadow: 0 0 10px black, 0 0 20px black;

  white-space: nowrap;
}

#num {
  min-width: 30px;
  text-align: center;
}

.negativo {
  color: #ff3b3b;
}

/* 🎮 painel bonito */
.panel {
  position: fixed;
  bottom: 20px;
  left: 20px;
  width: 220px;

  background: rgba(15,15,15,0.95);
  border-radius: 12px;
  padding: 15px;

  color: white;
  font-family: Arial;

  display: none;

  box-shadow: 0 0 20px #00ffcc33;
}

.panel h2 {
  margin: 0 0 10px;
  text-align: center;
  color: #00ffcc;
}

.panel button {
  width: 100%;
  margin: 5px 0;
  padding: 8px;

  border: none;
  border-radius: 6px;

  font-weight: bold;
  cursor: pointer;
}

.add { background: #00ffcc; color: black; }
.sub { background: #ff3b3b; }
.reset { background: orange; color: black; }

.panel input {
  width: 100%;
  margin: 5px 0;
  padding: 5px;
}
</style>
</head>

<body>

<div class="overlay">
  🏆 <span id="num">0</span><span id="max">/10</span> <span id="label">wins</span>
</div>

<div class="panel" id="panel">
  <h2>CONTROL</h2>

  <button class="add" onclick="add()">+1</button>
  <button class="sub" onclick="sub()">-1</button>
  <button class="reset" onclick="reset()">Reset</button>

  <hr>

  Meta:
  <input id="maxInput" type="number" placeholder="Ex: 10">

  Texto:
  <input id="labelInput" type="text" placeholder="Ex: wins">

  Valor:
  <input id="manualInput" type="number" placeholder="Ex: 5">

  <button onclick="apply()">Aplicar</button>

  <hr>

  <small>
  ↑ ↓ + - = → alterar<br>
  0 → reset<br>
  HOME → lock
  </small>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAcg0UGMQ-iJbk_E8FSNLRipx2MvcJj4",
  authDomain: "wins-mine.firebaseapp.com",
  databaseURL: "https://wins-mine-default-rtdb.firebaseio.com/",
  projectId: "wins-mine",
  storageBucket: "wins-mine.firebasestorage.app",
  messagingSenderId: "328422738631",
  appId: "1:328422738631:web:dd115c799f82f5cb7e0ce2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const winsRef = ref(db, "overlay/wins");
const maxRef = ref(db, "overlay/max");
const labelRef = ref(db, "overlay/label");

let wins = 0;
let locked = false;

const num = document.getElementById("num");
const maxEl = document.getElementById("max");
const labelEl = document.getElementById("label");

// mostrar painel só no control
const params = new URLSearchParams(location.search);
if (params.get("view") === "control") {
  document.getElementById("panel").style.display = "block";
}

// 🔥 sincronização
onValue(winsRef, s => {
  wins = s.val() ?? 0;
  num.textContent = wins;
  num.classList.toggle("negativo", wins < 0);
});

onValue(maxRef, s => {
  maxEl.textContent = "/" + (s.val() ?? 10);
});

onValue(labelRef, s => {
  labelEl.textContent = s.val() ?? "wins";
});

// teclado
document.addEventListener("keydown", async (e) => {

  if (e.key === "Home") {
    locked = !locked;
    return;
  }

  if (locked) return;

  if (["ArrowUp","=","+"].includes(e.key))
    await set(winsRef, wins + 1);

  if (["ArrowDown","-"].includes(e.key))
    await set(winsRef, wins - 1);

  if (e.key === "0")
    await set(winsRef, 0);
});

// botões
window.add = () => set(winsRef, wins + 1);
window.sub = () => set(winsRef, wins - 1);
window.reset = () => set(winsRef, 0);

// aplicar alterações
window.apply = async () => {
  const m = maxInput.value;
  const l = labelInput.value;
  const v = manualInput.value;

  if (m) await set(maxRef, Number(m));
  if (l) await set(labelRef, l);
  if (v !== "") await set(winsRef, Number(v));
};
</script>

</body>
</html>
