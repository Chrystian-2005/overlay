<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Overlay</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  overflow: hidden;
  width: max-content;
  height: max-content;
  font-family: Arial, sans-serif;
}

/* 🔥 overlay pequeno */
.overlay {
  display: inline-flex;
  align-items: center;
  gap: 4px;

  font-size: 36px;
  font-weight: bold;
  color: white;

  text-shadow: 0 0 10px black, 0 0 20px black;

  white-space: nowrap;
}

/* painel */
.panel {
  position: fixed;
  bottom: 20px;
  left: 20px;

  width: 240px;
  padding: 15px;

  background: #1c1c1c;
  border-radius: 12px;

  display: none;
  color: white;
}

/* caixas separadas */
.card {
  background: #2a2a2a;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.card h3 {
  margin: 0 0 8px;
  color: #00ffcc;
  font-size: 14px;
}

button {
  width: 100%;
  margin-top: 5px;
  padding: 6px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

.add { background: #00ffcc; color: black; }
.sub { background: #ff3b3b; }
.reset { background: orange; color: black; }

input {
  width: 100%;
  margin-top: 5px;
  padding: 4px;
}
</style>
</head>

<body>

<div class="overlay">
  🏆 <span id="num">0</span><span id="max">/10</span> <span id="label">wins</span>
</div>

<div class="panel" id="panel">

  <div class="card">
    <h3>CONTROL</h3>
    <button class="add" onclick="add()">+1</button>
    <button class="sub" onclick="sub()">-1</button>
    <button class="reset" onclick="resetWins()">reset</button>
  </div>

  <div class="card">
    <h3>Meta final</h3>
    <input id="maxInput">
    <button onclick="setMax()">Aplicar</button>
    <button class="reset" onclick="resetMax()">reset</button>
  </div>

  <div class="card">
    <h3>Texto</h3>
    <input id="labelInput">
    <button onclick="setLabel()">Aplicar</button>
    <button class="reset" onclick="resetLabel()">reset</button>
  </div>

  <div class="card">
    <h3>Valor actual</h3>
    <input id="manualInput">
    <button onclick="setValue()">Aplicar</button>
    <button class="reset" onclick="resetValue()">reset</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAcg0UGMQ-iJbk_E8FSNLRipx2MvcJj4",
  authDomain: "wins-mine.firebaseapp.com",
  databaseURL: "https://wins-mine-default-rtdb.firebaseio.com/",
  projectId: "wins-mine",
  storageBucket: "wins-mine.firebasestorage.app",
  messagingSenderId: "328422738631",
  appId: "1:328422738631:web:dd115c799f82f5cb7e0ce2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const winsRef = ref(db, "overlay/wins");
const maxRef = ref(db, "overlay/max");
const labelRef = ref(db, "overlay/label");

let wins = 0;

const num = document.getElementById("num");
const maxEl = document.getElementById("max");
const labelEl = document.getElementById("label");

// mostrar panel solo en control
const params = new URLSearchParams(location.search);
const isControl = params.get("view") === "control";

if (isControl) {
  document.getElementById("panel").style.display = "block";
}

// 🔥 sync
onValue(winsRef, s => {
  wins = s.val() ?? 0;
  num.textContent = wins;
});

onValue(maxRef, s => {
  maxEl.textContent = "/" + (s.val() ?? 10);
});

onValue(labelRef, s => {
  labelEl.textContent = s.val() ?? "wins";
});

// 🚫 teclado só no control
if (isControl) {
  document.addEventListener("keydown", async (e) => {

    if (["ArrowUp","=","+"].includes(e.key))
      await set(winsRef, wins + 1);

    if (["ArrowDown","-"].includes(e.key))
      await set(winsRef, wins - 1);

    if (e.key === "0")
      await set(winsRef, 0);
  });
}

// botões
window.add = () => set(winsRef, wins + 1);
window.sub = () => set(winsRef, wins - 1);

window.resetWins = () => set(winsRef, 0);
window.resetMax = () => set(maxRef, 10);
window.resetLabel = () => set(labelRef, "wins");
window.resetValue = () => set(winsRef, 0);

window.setMax = () => set(maxRef, Number(maxInput.value));
window.setLabel = () => set(labelRef, labelInput.value);
window.setValue = () => set(winsRef, Number(manualInput.value));
</script>

</body>
</html>
