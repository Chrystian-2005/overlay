<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wins Overlay</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
}

.box {
  position: fixed;
  top: 60px;
  left: 60px;
  font-size: 48px;
  font-weight: 700;
  color: white;
  text-shadow:
    0 0 10px rgba(0,0,0,0.8),
    0 0 20px rgba(0,0,0,0.6);
  cursor: grab;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 10px;
}

#num {
  min-width: 70px;
  text-align: center;
  transition: 0.2s;
}

.negativo {
  color: #ff3b3b;
  text-shadow:
    0 0 10px rgba(255,0,0,0.8),
    0 0 20px rgba(255,0,0,0.6);
}

.label {
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="box" id="box">
  <span>🏆</span>
  <span id="num">0</span>
  <span>/10</span>
  <span class="label">wins</span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAcg0UGMQ-iJbk_E8FSNLRipx2MvcJj4",
  authDomain: "wins-mine.firebaseapp.com",
  databaseURL: "https://wins-mine-default-rtdb.firebaseio.com/",
  projectId: "wins-mine",
  storageBucket: "wins-mine.firebasestorage.app",
  messagingSenderId: "328422738631",
  appId: "1:328422738631:web:dd115c799f82f5cb7e0ce2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const winsRef = ref(db, "overlay/wins");

let wins = 0;
let locked = false;

const num = document.getElementById("num");
const box = document.getElementById("box");

// posição salva
const savedX = localStorage.getItem("overlayX");
const savedY = localStorage.getItem("overlayY");

if (savedX && savedY) {
  box.style.left = savedX + "px";
  box.style.top = savedY + "px";
}

function render() {
  num.textContent = wins;

  if (wins < 0) {
    num.classList.add("negativo");
  } else {
    num.classList.remove("negativo");
  }
}

// 🔥 sincronização Firebase
onValue(winsRef, (snapshot) => {
  const value = snapshot.val();
  wins = typeof value === "number" ? value : 0;
  render();
});

// 🎮 teclas
document.addEventListener("keydown", async (e) => {

  if (e.key === "Home") {
    locked = !locked;
    return;
  }

  if (locked) return;

  // subir (seta ↑ ou =)
  if (e.key === "ArrowUp" || e.key === "=") {
    await set(winsRef, wins + 1);
  }

  // descer (seta ↓ ou -)
  if (e.key === "ArrowDown" || e.key === "-") {
    await set(winsRef, wins - 1);
  }

  // zerar
  if (e.key === "0") {
    await set(winsRef, 0);
  }
});

// arrastar
let dragging = false;
let offsetX = 0;
let offsetY = 0;

box.addEventListener("mousedown", (e) => {
  dragging = true;
  offsetX = e.clientX - box.offsetLeft;
  offsetY = e.clientY - box.offsetTop;
  box.style.cursor = "grabbing";
});

document.addEventListener("mousemove", (e) => {
  if (dragging) {
    const newX = e.clientX - offsetX;
    const newY = e.clientY - offsetY;

    box.style.left = newX + "px";
    box.style.top = newY + "px";

    localStorage.setItem("overlayX", newX);
    localStorage.setItem("overlayY", newY);
  }
});

document.addEventListener("mouseup", () => {
  dragging = false;
  box.style.cursor = "grab";
});

render();
</script>

</body>
</html>
